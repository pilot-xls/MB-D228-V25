<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora</title>
        <link rel="stylesheet" href="css/theme.css">
        <link rel="stylesheet" href="css/calculadora.css">
        <link rel="stylesheet" href="css/menu.css">
    </head>
    <body>
        <header>
            <div id="header"></div>
        </header>
        <main class="container">
            <section class="section calculator-block">
                <div class="time-calculator">
                    <h3 class="block-title">Calculadora de Tempo</h3>

                    <div class="total-mobile-card">
                        <span>Total acumulado</span>
                        <strong id="totalDisplay">00h 00m</strong>
                    </div>

                    <div class="time-input-grid">
                        <label>
                            Horas
                            <input id="hoursInput" type="number" min="0" step="1" inputmode="numeric" placeholder="0">
                        </label>
                        <label>
                            Minutos
                            <input id="minutesInput" type="number" min="0" step="5" inputmode="numeric" placeholder="00">
                        </label>
                    </div>

                    <div class="manual-actions">
                        <button id="manualAddBtn" type="button" class="primary-btn">+ Aplicar</button>
                        <button id="manualSubtractBtn" type="button" class="danger-btn">- Aplicar</button>
                    </div>

                    <div class="quick-wrap">
                        <p class="quick-title">Somar rápido</p>
                        <div class="quick-actions">
                            <button type="button" class="quick-btn" data-op="+" data-minutes="5">+5m</button>
                            <button type="button" class="quick-btn" data-op="+" data-minutes="10">+10m</button>
                            <button type="button" class="quick-btn" data-op="+" data-minutes="15">+15m</button>
                            <button type="button" class="quick-btn" data-op="+" data-minutes="20">+20m</button>
                            <button type="button" class="quick-btn" data-op="+" data-minutes="30">+30m</button>
                            <button type="button" class="quick-btn" data-op="+" data-minutes="60">+1h</button>
                            <button type="button" class="quick-btn" data-op="+" data-minutes="120">+2h</button>
                        </div>
                    </div>

                    <div class="quick-wrap">
                        <p class="quick-title">Subtrair rápido</p>
                        <div class="quick-actions">
                            <button type="button" class="quick-btn subtract" data-op="-" data-minutes="5">-5m</button>
                            <button type="button" class="quick-btn subtract" data-op="-" data-minutes="10">-10m</button>
                            <button type="button" class="quick-btn subtract" data-op="-" data-minutes="15">-15m</button>
                            <button type="button" class="quick-btn subtract" data-op="-" data-minutes="20">-20m</button>
                            <button type="button" class="quick-btn subtract" data-op="-" data-minutes="30">-30m</button>
                            <button type="button" class="quick-btn subtract" data-op="-" data-minutes="60">-1h</button>
                            <button type="button" class="quick-btn subtract" data-op="-" data-minutes="120">-2h</button>
                        </div>
                    </div>

                    <div class="history-panel">
                        <div class="time-shell-header">
                            <span class="mini-label">Histórico</span>
                            <div class="history-top-actions">
                                <button id="undoBtn" type="button" class="ghost-btn">Undo</button>
                                <button id="clearHistoryBtn" type="button" class="ghost-btn danger">Limpar</button>
                            </div>
                        </div>
                        <ul id="timeHistory" class="time-history" aria-live="polite"></ul>
                    </div>
                </div>
            </section>

            <section class="section conversions-block">
                <div class="calc-block">
                    <h2 class="block-title">Conversões</h2>
                    <div class="conversion-line">
                        <label>lb ↔ kg</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="lb" placeholder="lb" oninput="lbToKg()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="kg" placeholder="kg" oninput="kgToLb()">
                    </div>
                    <div class="conversion-line">
                        <label>L ↔ lb</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="Lts" placeholder="L" oninput="lToLbA1()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="lbA1" placeholder="Lb" oninput="lbA1ToL()">
                    </div>
                    <div class="conversion-line">
                        <label>USG ↔ L</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="usg" placeholder="USG" oninput="usgToL()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="l" placeholder="L" oninput="lToUsg()">
                    </div>
                    <div class="conversion-line">
                        <label>ft ↔ m</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="ft" placeholder="ft" oninput="ftToM()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="m" placeholder="m" oninput="mToFt()">
                    </div>
                    <div class="conversion-line">
                        <label>NM ↔ km</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="nm" placeholder="NM" oninput="nmToKm()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="km" placeholder="km" oninput="kmToNm()">
                    </div>
                    <div class="conversion-line">
                        <label>kt ↔ km/h</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="kt" placeholder="kt" oninput="ktToKmh()">
                        <input type="number" inputmode="numeric" pattern="[0-9]*" id="kmh" placeholder="km/h" oninput="kmhToKt()">
                    </div>
                </div>
            </section>
        </main>
        <script src="js/general.js"></script>
        <script src="js/calculadora.js"></script>
    </body>
</html>
